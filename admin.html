<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="admin">



<div id="loginBox" class="box">


<h1>🔐 Painel Admin</h1>


<p>Acesso do proprietário</p>


<input 
id="senha"
type="password"
placeholder="Senha de acesso"
>


<button onclick="login()">

Entrar

</button>


</div>





<div id="painel" class="box" style="display:none;">



<h1>🛒 Gerenciar Loja</h1>



<h2>➕ Novo Produto</h2>



<input 
id="nome"
placeholder="Nome do produto"
>



<input 
id="imagem"
placeholder="Link da imagem"
>



<select id="categoria">

<option>🎮 Jogos</option>

<option>📱 Apps</option>

<option>🔑 Chaves</option>

<option>📚 Cursos</option>

<option>🤖 Bots</option>

<option>📦 Outros</option>

</select>




<textarea 
id="descricao"
placeholder="Descrição do produto">
</textarea>





<input 
id="preco"
placeholder="Preço (ex: 10.00)"
>





<select id="tipo">


<option>
Produto digital
</option>


<option>
Serviço
</option>


</select>





<input 
id="entrega"
placeholder="Forma de entrega"
>




<button onclick="salvar()">

💾 Salvar Produto

</button>






<hr>




<h2>📦 Produtos cadastrados</h2>


<div id="lista"></div>






<hr>





<h2>🛒 Pedidos</h2>


<div id="pedidos"></div>





</div>



</div>






<script src="js/banco.js"></script>

<script src="js/admin.js"></script>



</body>

</html>
